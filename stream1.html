<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>D3X Sports // Stream 2</title>

<!-- Shaka Player 5.1.8 (best DASH + DRM support) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<!-- Orbitron font for the watermark -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap" rel="stylesheet">

<style>
/* ---------- Base ---------- */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Hide default Shaka spinner, use our own */
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}

/* ---------- Custom loading spinner ---------- */
#loader{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9;opacity:0;pointer-events:none;transition:opacity .2s}
#loader.on{opacity:1}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#f5b301;border-radius:50%;animation:sp .8s linear infinite}
#loaderTxt{color:#fff;font-size:13px;letter-spacing:.5px;opacity:.85}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- Status / error overlay ---------- */
#status{position:absolute;inset:0;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:12;text-align:center;padding:24px}
#status.on{display:flex}
#status h2{color:#fff;font-size:18px;font-weight:600}
#status p{color:#bbb;font-size:13px;max-width:420px;line-height:1.5}
#status button{background:#f5b301;color:#111;border:0;padding:11px 26px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.5px}
#status button:hover{background:#ffc21f}

/* ---------- LIVE badge (click to jump to live edge) ---------- */
#live{position:absolute;top:16px;left:16px;z-index:6;display:none;align-items:center;gap:7px;background:rgba(0,0,0,.55);padding:6px 12px;border-radius:6px;cursor:pointer;transition:opacity .25s, top .25s}
#live.show{display:flex}
#live .dot{width:9px;height:9px;border-radius:50%;background:#ff3b30;box-shadow:0 0 0 0 rgba(255,59,48,.7);animation:pulse 1.8s infinite}
#live.behind .dot{background:#888;animation:none}
#live span{color:#fff;font-size:12px;font-weight:700;letter-spacing:1px}
#live.behind span{color:#ccc}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.7)}70%{box-shadow:0 0 0 7px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}

/* ---------- D3X Sports watermark (lower-middle) ---------- */
#wm{
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  z-index:5;
  pointer-events:none;
  display:flex;
  align-items:center;
  opacity:.42;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.85));
  transition:opacity .25s, bottom .25s;
}
.wm-text{
  font-family:'Orbitron','Segoe UI',sans-serif;
  font-weight:800;
  font-size:16px;
  letter-spacing:1.5px;
  white-space:nowrap;
  text-transform:uppercase;
}
.wm-text .d3x{color:#fff}
.wm-text .sports{color:#f5b301}
/* Lift watermark above the control bar when controls are visible */
.controls-visible #wm{bottom:58px;opacity:.32}

/* Small screens: shrink watermark */
@media (max-width:600px){
  .wm-text{font-size:13px;letter-spacing:1px}
  #live span{font-size:11px}
}
</style>
</head>
<body>
<div class="shaka-video-container" id="pc">
  <!-- Video -->
  <video id="v" autoplay playsinline muted preload="auto"></video>

  <!-- LIVE badge -->
  <div id="live" title="Jump to live"><span class="dot"></span><span>LIVE</span></div>

  <!-- Watermark -->
  <div id="wm"><div class="wm-text"><span class="d3x">D3X</span><span class="sports">Sports</span></div></div>

  <!-- Loading spinner -->
  <div id="loader"><div class="spin"></div><div id="loaderTxt">Loading stream…</div></div>

  <!-- Status / error overlay -->
  <div id="status">
    <h2 id="statusTitle">Connection lost</h2>
    <p id="statusMsg">We're trying to reconnect to the stream.</p>
    <button id="statusBtn">Reload</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
/* =======================================================
   >>> TEST SWITCH <
   TEST_MODE = true  -> free public DASH sample (no DRM) to
                        confirm the player itself works.
   TEST_MODE = false -> real D3X Sports live stream.
======================================================= */
const TEST_MODE = false;

/* ---------- Stream + DRM ---------- */
const REAL_STREAM_URL = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd";
const REAL_KEY_ID = "14eeabf30c14b7fbf3008c03099ce011";
const REAL_KEY    = "17d2ac8dbc5429bd70af3433aa12158d";

const TEST_STREAM_URL = "https://storage.googleapis.com/shaka-demo-assets/angel-one/dash.mpd";

const STREAM_URL = TEST_MODE ? TEST_STREAM_URL : REAL_STREAM_URL;
const KEY_ID     = TEST_MODE ? "" : REAL_KEY_ID;
const KEY        = TEST_MODE ? "" : REAL_KEY;

/* ---------- Tunables (safe to adjust) ---------- */
const PRESENTATION_DELAY   = 12;   // seconds behind live edge — more = smoother, less = closer to live
const BUFFERING_GOAL       = 30;   // seconds of buffer to build ahead
const REBUFFERING_GOAL     = 4;    // seconds of buffer needed before resuming after a stall
const BUFFER_BEHIND        = 30;   // seconds of buffer kept behind playhead
const LIVE_EDGE_TOLERANCE  = 20;   // if we fall more than this behind live, badge shows "BEHIND"
const MAX_AUTO_RELOADS     = 6;    // auto-reconnect attempts before giving up
/* ======================================================= */

let player, videoEl, container, loader, loaderTxt, statusEl, statusTitle, statusMsg, statusBtn, liveBadge;
let autoReloads = 0;
let reloadTimer = null;
let watchdogTimer = null;

/* ---------- Error handling ---------- */
function describeError(error){
  let msg = `Error code: ${error.code}`;
  if (!error.category) return msg;
  if (error.category === shaka.util.Error.Category.NETWORK)  msg += " (Network)";
  else if (error.category === shaka.util.Error.Category.DRM) msg += " (DRM / decryption key)";
  else if (error.category === shaka.util.Error.Category.MANIFEST) msg += " (Manifest)";
  return msg;
}

function onPlayerErrorEvent(event){ handleError(event.detail); }

function handleError(error){
  console.error("PLAYER ERROR:", describeError(error), error);

  // DRM key problem — no point auto-reloading, tell the user clearly.
  if (error.code === 6001 || error.code === 6007 || error.code === 6013){
    showStatus("Stream is encrypted", "The decryption key is missing or incorrect. Please check the player configuration.", "Retry");
    return;
  }

  // Everything else (network/manifest/segment) -> auto-reconnect.
  scheduleAutoReload();
}

/* ---------- Auto-reconnect with backoff ---------- */
function scheduleAutoReload(){
  if (reloadTimer) return; // already scheduled
  if (autoReloads >= MAX_AUTO_RELOADS){
    showStatus("Can't reach the stream", "The stream may be offline or your connection dropped. Tap reload to try again.", "Reload");
    return;
  }
  autoReloads++;
  const delay = Math.min(1000 * Math.pow(1.6, autoReloads), 8000); // capped backoff
  loaderTxt.textContent = `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})`;
  loader.classList.add("on");
  reloadTimer = setTimeout(async () => {
    reloadTimer = null;
    await loadStream();
  }, delay);
}

function showStatus(title, msg, btnText){
  loader.classList.remove("on");
  statusTitle.textContent = title;
  statusMsg.textContent = msg;
  statusBtn.textContent = btnText || "Reload";
  statusEl.classList.add("on");
}
function hideStatus(){ statusEl.classList.remove("on"); }

/* ---------- Live-edge helpers ---------- */
function seekToLive(){
  try{
    if (player.isLive()){
      const range = player.seekRange();
      videoEl.currentTime = range.end;      // Shaka clamps to the safe live edge internally
      videoEl.play().catch(()=>{});
    }
  }catch(e){ /* ignore */ }
}

function updateLiveBadge(){
  if (!player || !player.isLive()){ liveBadge.classList.remove("show"); return; }
  liveBadge.classList.add("show");
  try{
    const behind = player.seekRange().end - videoEl.currentTime;
    liveBadge.classList.toggle("behind", behind > LIVE_EDGE_TOLERANCE);
  }catch(e){}
}

/* ---------- Stall watchdog: detect a frozen playhead and recover ---------- */
function startWatchdog(){
  let lastTime = -1, stalls = 0;
  clearInterval(watchdogTimer);
  watchdogTimer = setInterval(() => {
    updateLiveBadge();
    if (videoEl.paused || videoEl.ended || videoEl.readyState < 2) { lastTime = videoEl.currentTime; return; }
    if (Math.abs(videoEl.currentTime - lastTime) < 0.01){
      stalls++;
      if (stalls >= 4){          // ~4s frozen while it should be playing
        console.warn("Watchdog: playback frozen, jumping to live edge.");
        seekToLive();
        stalls = 0;
      }
    } else {
      stalls = 0;
    }
    lastTime = videoEl.currentTime;
  }, 1000);
}

/* ---------- Keyboard shortcuts ---------- */
function bindKeys(){
  document.addEventListener("keydown", (e) => {
    switch (e.key.toLowerCase()){
      case " ": case "k":
        e.preventDefault();
        videoEl.paused ? videoEl.play() : videoEl.pause();
        break;
      case "f":
        document.fullscreenElement ? document.exitFullscreen() : container.requestFullscreen();
        break;
      case "m":
        videoEl.muted = !videoEl.muted;
        break;
      case "l":                          // jump to live
        seekToLive();
        break;
      case "arrowup":
        e.preventDefault();
        videoEl.volume = Math.min(1, videoEl.volume + 0.1);
        break;
      case "arrowdown":
        e.preventDefault();
        videoEl.volume = Math.max(0, videoEl.volume - 0.1);
        break;
    }
  });
}

/* ---------- Load / reload the stream ---------- */
async function loadStream(){
  hideStatus();
  loaderTxt.textContent = autoReloads ? `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})` : "Loading stream…";
  loader.classList.add("on");
  try{
    await player.load(STREAM_URL);
    autoReloads = 0;               // success resets the counter
    loader.classList.remove("on");
    hideStatus();
    if (player.isLive()) seekToLive();
    try { await videoEl.play(); } catch(e){ console.warn("Autoplay prevented:", e); }
    updateLiveBadge();
  }catch(e){
    handleError(e);
  }
}

/* ---------- Boot ---------- */
document.addEventListener("DOMContentLoaded", async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()){
    document.body.innerHTML = "<div style='color:#fff;padding:40px;font:16px sans-serif'>Your browser is not supported. Please use an up-to-date Chrome, Edge or Firefox.</div>";
    return;
  }

  videoEl     = document.getElementById("v");
  container   = document.getElementById("pc");
  loader      = document.getElementById("loader");
  loaderTxt   = document.getElementById("loaderTxt");
  statusEl    = document.getElementById("status");
  statusTitle = document.getElementById("statusTitle");
  statusMsg   = document.getElementById("statusMsg");
  statusBtn   = document.getElementById("statusBtn");
  liveBadge   = document.getElementById("live");

  player = new shaka.Player();
  await player.attach(videoEl);

  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements: [
      'play_pause', 'mute', 'volume', 'time_and_duration',
      'spacer', 'picture_in_picture', 'playback_rate', 'quality', 'fullscreen'
    ],
    seekBarColors: { base:'rgba(255,255,255,0.3)', buffered:'rgba(255,255,255,0.65)', played:'#f5b301' },
    fadeDelay: 2,
    addBigPlayButton: true,
    doubleClickForFullscreen: true,
    tapSeekDistance: 10,
  });

  /* ---------- Player configuration (the buffering fix lives here) ---------- */
  const playerConfig = {
    abr: {
      enabled: true,
      defaultBandwidthEstimate: 4000000,   // start at a safe 4 Mbps, ABR climbs from there
      switchInterval: 8,
      restrictToElementSize: true,         // don't fetch 1080p into a small window
    },
    manifest: {
      defaultPresentationDelay: PRESENTATION_DELAY,
      dash: {
        ignoreSuggestedPresentationDelay: true,
        ignoreMinBufferTime: false,
        autoCorrectDrift: true
      },
      retryParameters: { maxAttempts: 6, baseDelay: 600, backoffFactor: 1.6, timeout: 30000 }
    },
    streaming: {
      bufferingGoal:   BUFFERING_GOAL,
      rebufferingGoal: REBUFFERING_GOAL,
      bufferBehind:    BUFFER_BEHIND,
      lowLatencyMode:  false,              // *** was the main cause of your rebuffering ***
      jumpLargeGaps:   true,
      gapDetectionThreshold: 0.5,
      stallEnabled:    true,
      stallThreshold:  1,
      stallSkip:       0.1,
      retryParameters: { maxAttempts: 8, baseDelay: 500, backoffFactor: 1.6, fuzzFactor: 0.5, timeout: 30000 }
    }
  };

  if (KEY_ID && KEY){
    playerConfig.drm = { clearKeys: { [KEY_ID]: KEY } };
  }
  player.configure(playerConfig);

  /* ---------- Events ---------- */
  player.addEventListener("error", onPlayerErrorEvent);
  player.addEventListener("buffering", (e) => {
    loader.classList.toggle("on", e.buffering);
    if (e.buffering) loaderTxt.textContent = "Buffering…";
  });

  videoEl.addEventListener("playing", () => { loader.classList.remove("on"); hideStatus(); });
  videoEl.addEventListener("waiting", () => { loader.classList.add("on"); });

  /* Track controls visibility so watermark + LIVE badge lift above the bar */
  const controlsContainer = container.querySelector(".shaka-controls-container");
  if (controlsContainer){
    new MutationObserver(() => {
      container.classList.toggle("controls-visible", controlsContainer.getAttribute("shown") !== null);
    }).observe(controlsContainer, { attributes:true, attributeFilter:["shown"] });
  }

  liveBadge.addEventListener("click", seekToLive);
  statusBtn.addEventListener("click", () => { autoReloads = 0; loadStream(); });
  container.addEventListener("contextmenu", (e) => e.preventDefault());  // block right-click menu

  bindKeys();
  startWatchdog();
  await loadStream();
});
</script>
</body>
</html>
