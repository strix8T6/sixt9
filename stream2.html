<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>D3X Sports // Stream 3</title>
<!-- Shaka Player 5.1.8 (DASH + HLS) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<!-- Kanit font for the watermark -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,600;0,800;1,600;1,800&display=swap" rel="stylesheet">
<style>
/* ---------- Base ---------- */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}
/* ---------- Custom loading spinner ---------- */
#loader{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9;opacity:0;pointer-events:none;transition:opacity .2s}
#loader.on{opacity:1}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#f5b301;border-radius:50%;animation:sp .8s linear infinite}
#loaderTxt{color:#fff;font-size:13px;letter-spacing:.5px;opacity:.85}
@keyframes sp{to{transform:rotate(360deg)}}
/* ---------- Tap-to-play overlay (iOS autoplay blocked) ---------- */
#tapPlay{position:absolute;inset:0;z-index:11;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);border:0;cursor:pointer}
#tapPlay.on{display:flex}
#tapPlay .btn{width:84px;height:84px;border-radius:50%;background:rgba(245,179,1,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.6)}
#tapPlay .btn svg{width:38px;height:38px;fill:#111;margin-left:5px}
/* ---------- Status / error overlay ---------- */
#status{position:absolute;inset:0;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:12;text-align:center;padding:24px}
#status.on{display:flex}
#status h2{color:#fff;font-size:18px;font-weight:600}
#status p{color:#bbb;font-size:13px;max-width:420px;line-height:1.5}
#status button{background:#f5b301;color:#111;border:0;padding:11px 26px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.5px}
#status button:hover{background:#ffc21f}
/* ---------- LIVE badge (bottom-right near controls) ---------- */
#live{position:absolute;bottom:62px;right:16px;z-index:6;display:none;align-items:center;gap:7px;background:rgba(0,0,0,.65);padding:7px 14px;border-radius:8px;cursor:pointer;transition:opacity .25s,bottom .25s;backdrop-filter:blur(8px)}
#live.show{display:flex}
#live .dot{width:10px;height:10px;border-radius:50%;background:#ff3b30;box-shadow:0 0 0 0 rgba(255,59,48,.7);animation:pulse 1.5s infinite}
#live.behind .dot{background:#888;animation:none}
#live span{color:#fff;font-size:13px;font-weight:700;letter-spacing:1.5px}
#live.behind span{color:#ccc}
.controls-visible #live{bottom:72px}
body.ios #live{bottom:80px}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.7)}70%{box-shadow:0 0 0 7px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}
/* ---------- D3X Sports watermark (lower-middle) ---------- */
#wm{
  position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
  z-index:5;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:1px;
  opacity:.55;filter:drop-shadow(0 2px 5px rgba(0,0,0,.9));transition:opacity .25s, bottom .25s;
}
.wm-logo{font-family:'Kanit','Segoe UI',sans-serif;font-weight:800;font-style:italic;font-size:22px;line-height:1;letter-spacing:.5px;white-space:nowrap;text-transform:uppercase}
.wm-logo .d3x{color:#fff}
.wm-logo .sports{color:#f5b301;margin-left:.12em}
.wm-url{font-family:'Kanit','Segoe UI',sans-serif;font-weight:600;font-style:italic;font-size:10.5px;letter-spacing:1.5px;color:#fff;opacity:.9;white-space:nowrap;text-transform:lowercase}
.controls-visible #wm{bottom:62px;opacity:.4}
body.ios #wm{bottom:76px}
@media (max-width:600px){
  .wm-logo{font-size:16px}
  .wm-url{font-size:8.5px;letter-spacing:1px}
  #live span{font-size:11px}
}
</style>
</head>
<body>
<div class="shaka-video-container" id="pc">
  <video id="v" autoplay playsinline muted preload="auto" webkit-playsinline x5-playsinline></video>
  <div id="live" title="Jump to live"><span class="dot"></span><span>LIVE</span></div>
  <div id="wm">
    <div class="wm-logo"><span class="d3x">D3X</span><span class="sports">Sports</span></div>
    <div class="wm-url">www.d3xsports.live</div>
  </div>
  <button id="tapPlay" aria-label="Play">
    <span class="btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
  </button>
  <div id="loader"><div class="spin"></div><div id="loaderTxt">Loading stream…</div></div>
  <div id="status">
    <h2 id="statusTitle">Connection lost</h2>
    <p id="statusMsg">We're trying to reconnect to the stream.</p>
    <button id="statusBtn">Reload</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
/* =======================================================
   STREAM CONFIGURATION  (HLS — works on Android, PC, iPhone)
======================================================= */
const STREAM_URL = "https://stream.mux.com/021OlUfuGmqdUhz00L021SzSqC2Jpfs56e5.m3u8?token=eyJhbGciOiJSUzI1NiJ9.eyJzdWIiOiIwMjFPbFVmdUdtcWRVaHowMEwwMjFTelNxQzJKcGZzNTZlNSIsImV4cCI6MTc4Mzg3MTMzOCwia2lkIjoiYmxCQUs4ZEhDZmkyM3F2bGJWckNRaW9aYnNya1ZzNlAiLCJhdWQiOiJ2In0.UHC03YPm3SAgtgmirVdLeLA1Vn-lPfzjtuQ6B6lZH6tKz0LBJ9j99JZowceCwYxXguyjwdz3xcgx_4CF0XeWL6Jnrm8OfWbYL-W7LMz3wp4LpKGN64LT_Jkx1vlDQJRaKrMAmtWwMjSK_s_7wLC39UauGCbDg8tdLfaVl87qO4iMasjFmChuxS6naMapT8YzE1bGHxkOoImvoqzj6YHsZhVTeNZdprsC9hQd56EiZe3ZodAZu6_8R5MHS5-1-CKTRlSrDrvG-zy9U8z72cPwoaqnW2WpPE7gNxDImGsOGLCMOhu3HiXxhsComtbjrrSfnQE80vlSFjxAPivAJT9ZKw";
/* ---------- Tunables: Fast start + heavy background buffer ---------- */
const BUFFERING_GOAL       = 60;  /* target buffer downloaded in background */
const REBUFFERING_GOAL     = 2;   /* only need 2s before playback starts = fast! */
const BUFFER_BEHIND        = 20;
const LIVE_EDGE_TOLERANCE  = 30;
const MAX_AUTO_RELOADS     = 12;
/* ======================================================= */
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
let player, videoEl, container, loader, loaderTxt, statusEl, statusTitle, statusMsg, statusBtn, liveBadge, tapPlay;
let autoReloads = 0, reloadTimer = null, watchdogTimer = null;
let usingNative = false;

function onPlayerErrorEvent(event){ handleError(event.detail); }
function handleError(error){
  console.error("PLAYER ERROR:", error && error.code, error);
  scheduleAutoReload();
}
function scheduleAutoReload(){
  if (reloadTimer) return;
  if (autoReloads >= MAX_AUTO_RELOADS){
    showStatus("Can't reach the stream", "The stream may be offline or your connection dropped. Tap reload to try again.", "Reload");
    return;
  }
  autoReloads++;
  const delay = Math.min(1000 * Math.pow(1.6, autoReloads), 8000);
  loaderTxt.textContent = `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})`;
  loader.classList.add("on");
  reloadTimer = setTimeout(async () => { reloadTimer = null; await loadStream(); }, delay);
}
function showStatus(title, msg, btnText){
  loader.classList.remove("on");
  statusTitle.textContent = title;
  statusMsg.textContent = msg;
  statusBtn.textContent = btnText || "Reload";
  statusEl.classList.add("on");
}
function hideStatus(){ statusEl.classList.remove("on"); }
function showTapPlay(){ loader.classList.remove("on"); tapPlay.classList.add("on"); }
function hideTapPlay(){ tapPlay.classList.remove("on"); }
async function tryPlay(){
  try{
    await videoEl.play();
    hideTapPlay();
  }catch(e){
    console.warn("Autoplay prevented:", e);
    showTapPlay();
  }
}
function getSeekEnd(){
  if (usingNative){
    try { return videoEl.seekable.length ? videoEl.seekable.end(videoEl.seekable.length - 1) : videoEl.currentTime; }
    catch(e){ return videoEl.currentTime; }
  }
  try { return player.seekRange().end; } catch(e){ return videoEl.currentTime; }
}
function isLiveStream(){
  if (usingNative) return videoEl.duration === Infinity;
  try { return player.isLive(); } catch(e){ return false; }
}
function seekToLive(){
  try{
    if (isLiveStream()){
      const rangeEnd = getSeekEnd();
      const target = Math.max(0.5, rangeEnd - 3);
      videoEl.currentTime = target;
      videoEl.play().catch(()=>{});
    }
  }catch(e){}
}
function updateLiveBadge(){
  if (!isLiveStream()){ liveBadge.classList.remove("show"); return; }
  liveBadge.classList.add("show");
  const behind = getSeekEnd() - videoEl.currentTime;
  liveBadge.classList.toggle("behind", behind > LIVE_EDGE_TOLERANCE);
}
function startWatchdog(){
  let lastTime = -1, stalls = 0, inStall = false;
  clearInterval(watchdogTimer);
  watchdogTimer = setInterval(() => {
    updateLiveBadge();
    if (videoEl.paused || videoEl.ended || videoEl.readyState < 2){ lastTime = videoEl.currentTime; return; }
    if (Math.abs(videoEl.currentTime - lastTime) < 0.01){
      stalls++;
      if (stalls >= 5 && !inStall){
        inStall = true;
        console.warn("Watchdog: stall detected, reducing quality and waiting for buffer.");
        try{
          if (!usingNative){
            const variants = player.getVariantTracks();
            const current = variants.find(t => t.active);
            if (current && current.bandwidth > 6000000 && variants.length > 1){
              const lower = variants.filter(t => t.bandwidth < current.bandwidth).sort((a,b)=>b.bandwidth-a.bandwidth)[0];
              if (lower) player.selectVariantTrack(lower, true);
            }
          }
        }catch(e){}
        videoEl.pause();
        setTimeout(() => { videoEl.play().catch(()=>{}); inStall = false; }, 1800);
        stalls = 0;
      }
    } else { stalls = 0; }
    lastTime = videoEl.currentTime;
  }, 1000);
}
function bindKeys(){
  document.addEventListener("keydown", (e) => {
    switch (e.key.toLowerCase()){
      case " ": case "k": e.preventDefault(); videoEl.paused ? videoEl.play() : videoEl.pause(); break;
      case "f": document.fullscreenElement ? document.exitFullscreen() : (container.requestFullscreen && container.requestFullscreen()); break;
      case "m": videoEl.muted = !videoEl.muted; break;
      case "l": seekToLive(); break;
      case "arrowup":   e.preventDefault(); videoEl.volume = Math.min(1, videoEl.volume + 0.1); break;
      case "arrowdown": e.preventDefault(); videoEl.volume = Math.max(0, videoEl.volume - 0.1); break;
    }
  });
}
function loadNativeHls(){
  usingNative = true;
  document.body.classList.add("ios");
  videoEl.controls = true;
  loaderTxt.textContent = "Loading stream…";
  loader.classList.add("on");
  videoEl.src = STREAM_URL;
  videoEl.addEventListener("canplay", () => {
    loader.classList.remove("on");
    hideStatus();
    tryPlay();
  }, { once:true });
  videoEl.addEventListener("playing", () => { loader.classList.remove("on"); hideTapPlay(); hideStatus(); });
  videoEl.addEventListener("error", () => scheduleAutoReload());
  videoEl.load();
}
function reloadNativeHls(){
  hideStatus();
  loader.classList.add("on");
  videoEl.src = STREAM_URL;
  videoEl.load();
  videoEl.addEventListener("canplay", () => { loader.classList.remove("on"); tryPlay(); }, { once:true });
}
async function loadStream(){
  if (usingNative){ reloadNativeHls(); return; }
  hideStatus();
  loaderTxt.textContent = autoReloads ? `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})` : "Loading stream…";
  loader.classList.add("on");
  try{
    await player.load(STREAM_URL);
    autoReloads = 0;
    loader.classList.remove("on");
    hideStatus();
    if (player.isLive()) seekToLive();
    await tryPlay();
    updateLiveBadge();
  }catch(e){ handleError(e); }
}
document.addEventListener("DOMContentLoaded", async () => {
  videoEl     = document.getElementById("v");
  container   = document.getElementById("pc");
  loader      = document.getElementById("loader");
  loaderTxt   = document.getElementById("loaderTxt");
  statusEl    = document.getElementById("status");
  statusTitle = document.getElementById("statusTitle");
  statusMsg   = document.getElementById("statusMsg");
  statusBtn   = document.getElementById("statusBtn");
  liveBadge   = document.getElementById("live");
  tapPlay     = document.getElementById("tapPlay");

  liveBadge.addEventListener("click", seekToLive);
  tapPlay.addEventListener("click", () => {
    videoEl.muted = false;
    videoEl.play().then(hideTapPlay).catch(()=>{ videoEl.muted = true; videoEl.play().then(hideTapPlay).catch(()=>{}); });
  });
  container.addEventListener("contextmenu", (e) => e.preventDefault());

  if (IS_IOS && videoEl.canPlayType('application/vnd.apple.mpegurl')){
    statusBtn.addEventListener("click", () => { autoReloads = 0; reloadNativeHls(); });
    startWatchdog();
    loadNativeHls();
    return;
  }

  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()){
    document.body.innerHTML = "<div style='color:#fff;padding:40px;font:16px sans-serif'>Your browser is not supported. Please use an up-to-date Chrome, Edge or Firefox.</div>";
    return;
  }
  player = new shaka.Player();
  await player.attach(videoEl);
  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements: [
      'play_pause', 'mute', 'volume', 'time_and_duration',
      'spacer', 'picture_in_picture', 'playback_rate', 'quality', 'fullscreen'
    ],
    seekBarColors: { base:'rgba(255,255,255,0.3)', buffered:'rgba(255,255,255,0.65)', played:'#f5b301' },
    fadeDelay: 2,
    addBigPlayButton: true,
    doubleClickForFullscreen: true,
    tapSeekDistance: 10,
  });
  player.configure({
    abr: {
      enabled:true,
      defaultBandwidthEstimate:50000000,
      switchInterval:4,
      bandwidthDowngradeTarget:0.85,
      bandwidthUpgradeTarget:0.70,
      restrictToElementSize:false,
    },
    streaming: {
      bufferingGoal:BUFFERING_GOAL,
      rebufferingGoal:REBUFFERING_GOAL,
      bufferBehind:BUFFER_BEHIND,
      lowLatencyMode:false,
      jumpLargeGaps:true,
      gapDetectionThreshold:0.5,
      stallEnabled:true,
      stallThreshold:2,
      stallSkip:0.5,
      retryParameters:{ maxAttempts:10, baseDelay:400, backoffFactor:1.5, fuzzFactor:0.4, timeout:30000 }
    }
  });
  player.addEventListener("error", onPlayerErrorEvent);
  player.addEventListener("buffering", (e) => {
    loader.classList.toggle("on", e.buffering);
    if (e.buffering) loaderTxt.textContent = "Connecting to server…";
  });
  videoEl.addEventListener("playing", () => { loader.classList.remove("on"); hideTapPlay(); hideStatus(); });
  videoEl.addEventListener("waiting", () => { loader.classList.add("on"); });
  const controlsContainer = container.querySelector(".shaka-controls-container");
  if (controlsContainer){
    new MutationObserver(() => {
      container.classList.toggle("controls-visible", controlsContainer.getAttribute("shown") !== null);
    }).observe(controlsContainer, { attributes:true, attributeFilter:["shown"] });
  }
  statusBtn.addEventListener("click", () => { autoReloads = 0; loadStream(); });
  bindKeys();
  startWatchdog();
  await loadStream();
});
</script>
</body>
</html>
