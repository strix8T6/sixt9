<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>OneSports // GOL TV</title>
<!-- Using Shaka Player 5.1.8 for best DASH and DRM support -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<!-- Orbitron font for the watermark -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* Base Styles */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Hide Default Shaka Spinner */
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}

/* Premium Loading Spinner */
#loader{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:99;opacity:0;pointer-events:none;transition:opacity .4s ease}
#loader.on{opacity:1}
.spinner-container{position:relative;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.ring-1{position:absolute;width:100%;height:100%;border:4px solid transparent;border-top-color:#f5b301;border-right-color:#f5b301;border-radius:50%;animation:spin 1.2s cubic-bezier(0.5,0,0.5,1) infinite;filter:drop-shadow(0 0 10px rgba(245,179,1,.8))}
.ring-2{position:absolute;width:60%;height:60%;border:4px solid transparent;border-bottom-color:#ffffff;border-left-color:#ffffff;border-radius:50%;animation:spin-reverse .9s cubic-bezier(0.5,0,0.5,1) infinite;filter:drop-shadow(0 0 10px rgba(255,255,255,.8))}
#loaderTxt{color:#fff;font-size:14px;letter-spacing:.5px;opacity:.85;font-weight:600}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes spin-reverse{0%{transform:rotate(360deg)}100%{transform:rotate(0deg)}}

/* OneSports Text Watermark */
#wm{
  position:absolute;
  z-index:5;
  pointer-events:none;
  display:flex;
  align-items:center;
  opacity:0.65;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  transition:opacity .25s, bottom .25s, right .25s;
  bottom: 20px;
  right: 20px;
}
.wm-text {
  font-family: 'Orbitron', 'Segoe UI', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 1px;
  white-space: nowrap;
  text-transform: uppercase;
}
.wm-text .one { color: #ffffff; }
.wm-text .sports { color: #f5b301; }

/* Move watermark up when controls are active so they don't overlap */
.controls-visible #wm {
  bottom: 65px; 
}
</style>
</head>
<body>
<div class="shaka-video-container" id="pc">
  <!-- Video element -->
  <video id="v" autoplay playsinline muted preload="metadata"></video>
  
  <!-- Watermark -->
  <div id="wm">
    <div class="wm-text"><span class="one">D3X</span><span class="sports">Sports</span></div>
  </div>
  
  <!-- Loading Spinner -->
  <div id="loader">
    <div class="spinner-container">
      <div class="ring-1"></div>
      <div class="ring-2"></div>
    </div>
    <div id="loaderTxt">Loading your stream…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
/* =======================================================
   STREAM AND DRM CONFIGURATION 
======================================================= */
const STREAM_URL = "https://dmbgaz4xf6jyh.cloudfront.net/live-stream-dai/69690cfcce0dc031830e7c1a/123a264b71764485bd49eca2d552cf33/d97743de3620a865848fff7a9de14dda1bf2409d/session/7a87848e-f247-40ab-b58b-a9ce9624551e/manifest.mpd?aid=688aae6d61c87d6274c05065&dnt=true&access_token=63ey9SOpQeHBRfWJYQLXQjelQc0QM1HXmlHp4iZrH8UCOCM8QtGIGg1sEEPJH0R0yXktUEXdLeB&uid=Knx65GY6UbaWSADZybEvf6m5MvqNIuNs&sid=bwRy9BgSc4RFeVhYh52hVIY8uPsJ4v4d&pid=A0xT1VnepBvKKqyeyRNtNkZBmHBrNNZM&ref=ditu.caracoltv.com&ext_pb=0&es=dmbgaz4xf6jyh.cloudfront.net&proto=https&pz=us&xr=us-east-2&manifestfilter=video_height:480-1080";

// 🔓 Decryption keys extracted from source:
const KEY_ID = "1c6bfd8d1cdd4df69ea5fc4dd2f025bb";
const KEY = "b6fd90027dac7a94a9461f8b2638cbb4";
/* ======================================================= */

function onPlayerErrorEvent(event) {
  onPlayerError(event.detail);
}

function onPlayerError(error) {
  let errorMsg = `Error code: ${error.code}`;
  if (error.category === shaka.util.Error.Category.NETWORK) {
    errorMsg += ` (Network Error).`;
  } else if (error.category === shaka.util.Error.Category.DRM) {
    errorMsg += ` (DRM Error - Did you forget to add the decryption key?).`;
  } else if (error.category === shaka.util.Error.Category.MANIFEST) {
    errorMsg += ` (Manifest Error).`;
  }
  if (error.data && error.data.length > 0) {
    errorMsg += ` | Details: ${error.data.join(', ')}`;
  }
  console.error(`CRITICAL ERROR: ${errorMsg}`);
  
  if (error.code === 6001 || error.code === 6013 || KEY === "PUT_YOUR_DECRYPTION_KEY_HERE") {
      alert("DRM Error: This stream is encrypted. You must provide the correct Decryption Key in the HTML code.");
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) {
    console.error('Browser not supported!');
    return;
  }

  const videoEl = document.getElementById('v');
  const container = document.getElementById('pc');
  const loader = document.getElementById('loader');
  const loaderTxt = document.getElementById('loaderTxt');

  /* ---------- Rotating Loading Sentences ---------- */
  const loadingPhrases = [
    "Connecting to live server...",
    "Optimizing video quality...",
    "Fetching secure stream data...",
    "Almost ready...",
    "Bypassing geo-restrictions...",
    "Loading your stream..."
  ];
  let phraseTimer = null;

  function startPhrases() {
    if (phraseTimer) return;
    let i = 0;
    phraseTimer = setInterval(() => {
      i = (i + 1) % loadingPhrases.length;
      if (loader.classList.contains("on")) {
        loaderTxt.textContent = loadingPhrases[i];
      }
    }, 2500);
  }
  function stopPhrases() {
    if (phraseTimer) { clearInterval(phraseTimer); phraseTimer = null; }
  }

  const player = new shaka.Player();
  await player.attach(videoEl);

  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements: [
      'play_pause', 'mute', 'volume', 'time_and_duration',
      'spacer', 'picture_in_picture', 'quality', 'fullscreen'
    ],
    seekBarColors: { base: 'rgba(255,255,255,0.3)', buffered: 'rgba(255,255,255,0.6)', played: '#f5b301' },
    fadeDelay: 3,
    addBigPlayButton: true,
  });

  player.addEventListener('error', onPlayerErrorEvent);

  player.addEventListener('buffering', (e) => {
    loader.classList.toggle('on', e.buffering);
    if (e.buffering) {
      loaderTxt.textContent = "Loading your stream…";
      startPhrases();
    } else {
      stopPhrases();
    }
  });

  videoEl.addEventListener("playing", () => { loader.classList.remove("on"); stopPhrases(); });
  videoEl.addEventListener("waiting", () => { loader.classList.add("on"); startPhrases(); });

  const controlsContainer = container.querySelector('.shaka-controls-container');
  if (controlsContainer) {
    const observer = new MutationObserver(() => {
      container.classList.toggle('controls-visible', controlsContainer.getAttribute('shown') !== null);
    });
    observer.observe(controlsContainer, { attributes: true, attributeFilter: ['shown'] });
  }

  const playerConfig = {
    abr: {
      enabled: true, 
      defaultBandwidthEstimate: 10000000, 
    },
    manifest: {
      defaultPresentationDelay: 15,
      dash: { ignoreSuggestedPresentationDelay: false, ignoreMinBufferTime: false, autoCorrectDrift: true }
    },
    streaming: {
      bufferingGoal: 15,
      rebufferingGoal: 2,
      bufferBehind: 15,
      lowLatencyMode: false,
      jumpLargeGaps: true,
      retryParameters: {
        maxAttempts: 5,
        baseDelay: 1000,
        timeout: 20000
      }
    }
  };

  // 🔓 Apply DRM Keys
  if (KEY_ID && KEY && KEY !== "PUT_YOUR_DECRYPTION_KEY_HERE") {
    playerConfig.drm = {
      clearKeys: {
        [KEY_ID]: KEY
      }
    };
  }

  player.configure(playerConfig);

  loader.classList.add('on');
  try {
    await player.load(STREAM_URL);
    loader.classList.remove('on');
    stopPhrases();
    
    if (player.isLive()) {
      videoEl.currentTime = player.seekRange().end;
    }

    try {
      await videoEl.play();
    } catch (e) {
      console.warn('Autoplay prevented by browser:', e);
    }
  } catch (e) {
    onPlayerErrorEvent({detail: e});
    loader.classList.remove('on');
    stopPhrases();
  }
});
</script>
</body>
</html>
